<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AU Ratings Settings</title>
</head>
<body>
    <div id="AuRatingsSettingsPage" data-role="page" class="page type-interior" data-require="emby-input,emby-button,emby-select">
        <div data-role="content">
            <div class="content-primary">
                <h2>AU Ratings Settings</h2>
                <form id="AuRatingsSettingsForm">
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="settingsPerPage">Items Per Page</label>
                        <input id="settingsPerPage" type="number" is="emby-input" min="10" max="200" />
                        <div class="fieldDescription">Number of items to show per page (10-200).</div>
                    </div>
                    <div class="selectContainer">
                        <label class="selectLabel" for="settingsView">Default View</label>
                        <select is="emby-select" id="settingsView" class="emby-select">
                            <option value="Table">Table</option>
                            <option value="Cards">Cards</option>
                        </select>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script src="configurationpage?name=auratingsconfigjs"></script>
    </div>
</body>
</html>
